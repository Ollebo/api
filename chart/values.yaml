# Default values for chart.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 2

image:
  repository: ollebo/api
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

ingress:
  className: traefik
  host: api.ollebo.com
  clusterIssuer: letsencrypt-prod

hpa:
  minReplicas: 2
  maxReplicas: 10
  targetCPU: 70
