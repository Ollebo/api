# Default values for chart.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 2

image:
  repository: ollebo/api
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

ingress:
  className: traefik
  host: api.ollebo.com
  clusterIssuer: http

hpa:
  minReplicas: 2
  maxReplicas: 10
  targetCPU: 70

# One-shot Job (chart/templates/nats-init-job.yaml) that runs code/db/initNats.py
# to (re)bind the JetStream streams — notably events -> "events.>" for the split
# public/private mission subjects. Runs once per release.
natsInit:
  enabled: true

# Dummy-traffic simulator (chart/templates/simulator.yaml) that pushes
# drone/boat/rover telemetry + temperature events into the public mission so the
# GUI has live data. Set enabled: false once real data flows.
simulator:
  enabled: true
  missionKey: "6f737b8c-f2ff-4e67-b7ee-abf29a2d7373"
  intervalSeconds: 2
  drones: 2
  boats: 1
  rovers: 1
  tempSensors: 1
