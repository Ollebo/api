apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: ollebo-api
  template:
    metadata:
      labels:
        app: ollebo-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 35
      containers:
        - image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          name: {{ .Release.Name }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
          - name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: ollebo-app
                key: password
          - name: API_KEY
            valueFrom:
              secretKeyRef:
                name: ollebo
                key: API_KEY
          - name: NATS
            value: nats://nats:4222
          - name: POSTGRES_DB
            value: ollebo
          - name: POSTGRES_HOST
            value: ollebo-rw
          - name: POSTGRES_USER
            value: ollebo
          - name: PROJECT
            value: ollebo
          - name: REDIS_HOST
            value: redis
          - name: REDIS_PORT
            value: "6379"
          # Keycloak config (same KC_* vars as dw). The api derives the JWKS URL
          # from these to verify Bearer tokens; empty KC_HOST => auth disabled.
          - name: KC_HOST
            value: {{ .Values.keycloak.host | quote }}
          - name: KC_PORT
            value: {{ .Values.keycloak.port | quote }}
          - name: KC_PROTOCOL
            value: {{ .Values.keycloak.protocol | quote }}
          - name: KC_REALM
            value: {{ .Values.keycloak.realm | quote }}
          # Object storage for mission pictures — same S3-compatible backend and
          # AWS_* conventions as dw (Hetzner in prod). Credentials come from the
          # shared `ollebo` Secret (same keys dw reads).
          - name: AWS_ENDPOINT
            value: {{ .Values.storage.endpoint | quote }}
          - name: AWS_BUCKET
            value: {{ .Values.storage.bucket | quote }}
          - name: AWS_REGION
            value: {{ .Values.storage.region | quote }}
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: ollebo
                key: AWS_ACCESS_KEY_ID
                optional: true
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: ollebo
                key: AWS_SECRET_ACCESS_KEY
                optional: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
