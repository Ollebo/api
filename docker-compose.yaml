services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api
    image: ollebo/api
    volumes:
      - ./:/data
    ports:
      - 8888:8080
    # Loads code/db/../.env if present (git-ignored) so local KC/overrides match
    # dw; the inline vars below are the defaults and keep compose working without it.
    env_file:
      - path: .env
        required: false
    environment:
      - API_KEY=dev-key
      - NATS=nats://nats:4222
      - POSTGRES_DB=ollebo
      - POSTGRES_HOST=postgres
      - POSTGRES_PASSWORD=ollebo
      - POSTGRES_USER=ollebo
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Keycloak (same KC_* vars as dw). Verifies real tokens from prod Keycloak.
      - KC_HOST=auth.ollebo.com
      - KC_PORT=443
      - KC_PROTOCOL=https
      - KC_REALM=master
      # Object storage for mission pictures — same AWS_* conventions as dw
      # (Hetzner in prod), MinIO locally. AWS_PUBLIC_ENDPOINT is the
      # host-reachable base the API hands back / the browser fetches.
      - AWS_ENDPOINT=http://minio:9000
      - AWS_PUBLIC_ENDPOINT=http://localhost:9000
      - AWS_BUCKET=map-storage
      - AWS_REGION=hel1
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - base

  postgres:
    image: postgis/postgis:16-3.4
    container_name: postgres
    environment:
      - POSTGRES_DB=ollebo
      - POSTGRES_USER=ollebo
      - POSTGRES_PASSWORD=ollebo
    ports:
      - 5432:5432
    volumes:
      - ./code/db/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ollebo -d ollebo"]
      interval: 2s
      timeout: 3s
      retries: 30
    networks:
      - base

  nats:
    image: nats:2.10-alpine
    container_name: nats
    command: ["-js", "-m", "8222"]
    ports:
      - 4222:4222
      - 8222:8222
    networks:
      - base

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - 6379:6379
    networks:
      - base

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - 9000:9000   # S3 API
      - 9001:9001   # web console
    volumes:
      - miniodata:/data
    networks:
      - base

  # One-shot: create the map-storage bucket (mirrors dw's AWS_BUCKET) and make it
  # anonymously readable so the URLs the API returns are fetchable in a browser
  # during the demo. Exits 0.
  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      mc mb -p local/map-storage;
      mc anonymous set download local/map-storage;
      exit 0;
      "
    networks:
      - base


volumes:
  pgdata:
  miniodata:

networks:
  base:
    driver: bridge
