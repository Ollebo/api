services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api
    image: ollebo/api
    volumes:
      - ./:/data
    ports:
      - 8888:8080
    environment:
      - NATS=nats://nats:4222
      - POSTGRES_DB=ollebo
      - POSTGRES_HOST=postgres
      - POSTGRES_PASSWORD=ollebo
      - POSTGRES_USER=ollebo
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - base

  postgres:
    image: postgis/postgis:16-3.4
    container_name: postgres
    environment:
      - POSTGRES_DB=ollebo
      - POSTGRES_USER=ollebo
      - POSTGRES_PASSWORD=ollebo
    ports:
      - 5432:5432
    volumes:
      - ./code/db/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ollebo -d ollebo"]
      interval: 2s
      timeout: 3s
      retries: 30
    networks:
      - base

  nats:
    image: nats:2.10-alpine
    container_name: nats
    command: ["-js", "-m", "8222"]
    ports:
      - 4222:4222
      - 8222:8222
    networks:
      - base

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - 6379:6379
    networks:
      - base


volumes:
  pgdata:

networks:
  base:
    driver: bridge
